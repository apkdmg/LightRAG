# No-GPU LightRAG preset
#
# Three containers:
#   - lightrag  : the LightRAG API + WebUI (CPU)
#   - postgres  : pgvector — serves KV + DOC_STATUS + VECTORS
#   - neo4j     : graph storage
#
# Embedding, reranker, and LLM are expected to be cloud APIs (e.g. OpenAI +
# Jina), so nothing here needs a GPU.
#
# Database ports are published to 127.0.0.1 by default so a DBA can connect
# from the same host via psql / pg_dump / pgAdmin / Neo4j Browser /
# cypher-shell. Set POSTGRES_HOST_BIND / NEO4J_HOST_BIND in .env to expose on
# a different interface (e.g. the host's admin-network IP, or 0.0.0.0); in
# that case, restrict the listening ports at the host firewall.
#
# Companion .env template: env.docker-compose-no-gpu

services:
  lightrag:
    image: ghcr.io/apkdmg/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/apkdmg/lightrag:latest
    ports:
      - "${HOST:-0.0.0.0}:${PORT:-9621}:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./data/prompts:/app/data/prompts
      - ./.env:/app/.env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOST: "0.0.0.0"
      PORT: "9621"
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      PROMPT_DIR: "/app/data/prompts"
      # Storage selectors — pinned by this preset (the whole point of the
      # preset is the bundled DBs). Set here, not in .env, because LightRAG's
      # config reads these at module-import time before python-dotenv runs;
      # putting them at the Docker level guarantees they're set before Python
      # starts.
      KV_STORAGE: "PGKVStorage"
      VECTOR_STORAGE: "PGVectorStorage"
      GRAPH_STORAGE: "Neo4JStorage"
      DOC_STATUS_STORAGE: "PGDocStatusStorage"
      # Bundled-DB hostnames (the compose service names) + credentials
      # forwarded from .env via Compose substitution.
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DATABASE: "${POSTGRES_DATABASE:-lightrag}"
      NEO4J_URI: "neo4j://neo4j:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  postgres:
    # pgvector-enabled Postgres — used here for KV, DOC_STATUS, and VECTORS.
    # To add Apache AGE (so you can swap Neo4j for PGGraphStorage), use
    # `gzdaniel/postgres-for-rag:16.6` instead.
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing — set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing — set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DATABASE:-lightrag}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_HOST_BIND:-127.0.0.1}:${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_HOST_BIND:-127.0.0.1}:${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:?missing — set NEO4J_USERNAME in .env}/${NEO4J_PASSWORD:?missing — set NEO4J_PASSWORD in .env}
      NEO4J_dbms_default__database: "neo4j"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'PORT_HEX="$(printf ''%04X'' 7687)"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q ":$${PORT_HEX} "'
      interval: 10s
      timeout: 3s
      retries: 60
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
